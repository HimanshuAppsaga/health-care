<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | Indigo Clinical</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary": "#002e69",
                    "on-secondary-fixed": "#00201b",
                    "on-error": "#ffffff",
                    "on-primary": "#ffffff",
                    "surface": "#f8fafa",
                    "surface-tint": "#6b35e4",
                    "error-container": "#ffdad6",
                    "on-error-container": "#93000a",
                    "primary": "#390092",
                    "tertiary-container": "#004394",
                    "surface-dim": "#d8dada",
                    "on-secondary-fixed-variant": "#005046",
                    "secondary-fixed-dim": "#49dcc4",
                    "secondary-fixed": "#6cf9e0",
                    "inverse-primary": "#cebdff",
                    "on-surface-variant": "#494455",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-highest": "#e1e3e3",
                    "on-background": "#191c1d",
                    "surface-variant": "#e1e3e3",
                    "on-tertiary-container": "#90b4ff",
                    "inverse-on-surface": "#eff1f1",
                    "primary-fixed-dim": "#cebdff",
                    "secondary": "#006b5d",
                    "on-secondary-container": "#006f61",
                    "on-primary-fixed-variant": "#5202cc",
                    "surface-container": "#eceeee",
                    "on-surface": "#191c1d",
                    "surface-container-low": "#f2f4f4",
                    "primary-fixed": "#e8ddff",
                    "outline": "#7a7487",
                    "on-tertiary-fixed-variant": "#004395",
                    "on-secondary": "#ffffff",
                    "surface-container-high": "#e6e8e8",
                    "secondary-container": "#68f6dd",
                    "outline-variant": "#cbc3d8",
                    "tertiary-fixed-dim": "#adc6ff",
                    "on-tertiary-fixed": "#001a42",
                    "tertiary-fixed": "#d8e2ff",
                    "primary-container": "#5200cc",
                    "on-primary-container": "#bea7ff",
                    "surface-bright": "#f8fafa",
                    "error": "#ba1a1a",
                    "on-primary-fixed": "#21005d",
                    "background": "#f8fafa",
                    "on-tertiary": "#ffffff",
                    "inverse-surface": "#2e3131"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-image: radial-gradient(circle at 0% 0%, rgba(57, 0, 146, 0.03) 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, rgba(0, 107, 93, 0.03) 0%, transparent 50%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-fixed selection:text-on-primary-fixed">
<div class="w-full max-w-md space-y-8">
<div class="flex flex-col items-center space-y-2 mb-12">
<div class="flex items-center space-x-2">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">medical_services</span>
<span class="text-2xl font-headline font-black text-primary tracking-tighter uppercase">Indigo Clinical</span>
</div>
<p class="text-on-surface-variant font-body text-sm font-medium tracking-wide">Precision Sanctuary Enrollment</p>
</div>
<div class="bg-surface-container-lowest shadow-sm shadow-indigo-100/20 p-10 rounded-lg space-y-8 relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16 blur-3xl"></div>
<div class="relative space-y-2">
<h1 class="text-3xl font-headline font-extrabold text-on-surface tracking-tight">Create Account</h1>
<p class="text-on-surface-variant font-body text-sm">Join the ecosystem of elite healthcare precision.</p>
</div>
<form action="#" class="space-y-6" method="POST">
<div class="space-y-5">
<div class="space-y-1.5">
<label class="block text-[11px] font-headline font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="full_name">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg transition-colors group-focus-within:text-primary">person</span>
<input class="w-full bg-surface-container-low border-none rounded-lg py-3.5 pl-12 pr-4 text-sm font-medium focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-200 outline-none placeholder:text-outline-variant" id="full_name" name="full_name" placeholder="Dr. Julian Sterling" required="" type="text"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-[11px] font-headline font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg transition-colors group-focus-within:text-primary">alternate_email</span>
<input class="w-full bg-surface-container-low border-none rounded-lg py-3.5 pl-12 pr-4 text-sm font-medium focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-200 outline-none placeholder:text-outline-variant" id="email" name="email" placeholder="precision@indigoclinical.com" required="" type="email"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="block text-[11px] font-headline font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg transition-colors group-focus-within:text-primary">lock</span>
<input class="w-full bg-surface-container-low border-none rounded-lg py-3.5 pl-12 pr-4 text-sm font-medium focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-200 outline-none placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-[11px] font-headline font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="confirm_password">Confirm</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg transition-colors group-focus-within:text-primary">verified_user</span>
<input class="w-full bg-surface-container-low border-none rounded-lg py-3.5 pl-12 pr-4 text-sm font-medium focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-200 outline-none placeholder:text-outline-variant" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
</div>
</div>
<div class="flex items-center space-x-3 group cursor-pointer">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded border-outline-variant bg-surface-container-low text-primary focus:ring-primary/20 cursor-pointer transition-all duration-200" id="terms" name="terms" required="" type="checkbox"/>
</div>
<label class="text-[12px] font-medium text-on-surface-variant cursor-pointer select-none" for="terms">
                        I agree to the <a class="text-primary font-bold hover:underline underline-offset-2" href="#">Terms of Service</a> and <a class="text-primary font-bold hover:underline underline-offset-2" href="#">Privacy Protocol</a>.
                    </label>
</div>
<button class="w-full bg-primary text-on-primary font-headline font-extrabold text-sm py-4 rounded-lg shadow-lg shadow-indigo-200/50 hover:bg-primary-container active:scale-[0.98] transition-all duration-200 flex items-center justify-center space-x-2" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<div class="flex flex-col items-center pt-2 space-y-4">
<div class="w-full flex items-center space-x-4">
<div class="h-[1px] flex-1 bg-surface-container-high"></div>
<span class="text-[10px] font-headline font-bold uppercase tracking-[0.2em] text-outline">or</span>
<div class="h-[1px] flex-1 bg-surface-container-high"></div>
</div>
<p class="text-sm font-medium text-on-surface-variant">
                    Already have an account? 
                    <a class="text-secondary font-bold hover:text-on-secondary-container transition-colors ml-1" href="#">Log in</a>
</p>
</div>
</div>
<div class="flex flex-col md:flex-row items-center justify-between text-on-surface-variant text-[11px] font-headline font-bold uppercase tracking-widest opacity-60">
<p>© 2024 Indigo Clinical</p>
<div class="flex space-x-6 mt-4 md:mt-0">
<a class="hover:text-primary transition-colors" href="#">Help Center</a>
<a class="hover:text-primary transition-colors" href="#">System Status</a>
</div>
</div>
</div>
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 opacity-30">
<div class="absolute inset-0 bg-[radial-gradient(#cbc3d8_1px,transparent_1px)] [background-size:40px_40px]"></div>
</div>
</body></html>
