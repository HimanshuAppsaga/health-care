services:
    app:
        build: .
        container_name: laravel_app
        ports:
            - "8000:80"
        volumes:
            - .:/var/www/html
        depends_on:
            - mysql

    mysql:
        image: mysql:8.0
        container_name: laravel_db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: cms
            MYSQL_USER: cms_user
            MYSQL_PASSWORD: secret123
        ports:
            - "3307:3306"
        volumes:
            - mysql_data:/var/lib/mysql

volumes:
    mysql_data:
